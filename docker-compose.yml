# ─────────────────────────────────────────────────────────────────────────────
# AGRIFLOW-AI — Local Development Stack
#
# Services:
#   db       — PostgreSQL 18 with persistent volume
#   backend  — FastAPI (auto-reload enabled for development)
#
# Usage:
#   cp backend/.env.example backend/.env   # fill in real values first
#   docker compose up --build
#
# Run migrations separately (before first start or after schema changes):
#   docker compose run --rm backend alembic upgrade head
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agriflow}
      POSTGRES_USER: ${POSTGRES_USER:-agriflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "25432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agriflow} -d ${POSTGRES_DB:-agriflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override localhost with the compose service name
      POSTGRES_HOST: db
      APP_ENV: development
      LOG_FORMAT: console
      LOG_LEVEL: DEBUG
    ports:
      - "8000:8000"
    volumes:
      # Mount source for live reload — dev only, remove for production
      - ./backend:/app
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
